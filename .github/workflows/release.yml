name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Build universal binary
        run: make universal

      - name: Package
        run: |
          ARCHIVE="CmdTabMaximizer-${{ steps.version.outputs.tag }}-universal.zip"
          zip -j "$ARCHIVE" dist/CmdTabMaximizer
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            install.sh
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/stoutput/CmdTabMax/main/install.sh | bash
            ```

            ## Uninstall

            ```sh
            launchctl bootout "gui/$(id -u)" ~/Library/LaunchAgents/com.cmdtabmaximizer.plist
            rm ~/Library/LaunchAgents/com.cmdtabmaximizer.plist /usr/local/bin/CmdTabMaximizer
            ```
